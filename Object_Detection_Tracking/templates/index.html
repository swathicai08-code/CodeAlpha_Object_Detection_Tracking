<!DOCTYPE html>

<html>

<head>

<title>Object Detection</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>YOLO Object Detection</h1>

<form
action="/detect"
method="POST"
enctype="multipart/form-data">

<input
type="file"
name="image"
required>

<br><br>

<button type="submit">

Detect Objects

</button>

</form>

{% if result_image %}

<h2>Result</h2>

<img
src="{{ result_image }}"
width="700">

{% endif %}

</body>

</html>
